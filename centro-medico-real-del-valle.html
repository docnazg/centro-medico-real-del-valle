<title>Centro Médico Real del Valle</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: {} }
}

<style>
  @media print {
    body { background: white !important; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    .print-page {
      width: 21.59cm; min-height: 27.94cm;
      margin: 0; padding: 1.5cm;
      font-family: 'Times New Roman', serif;
      font-size: 11pt; color: #000;
    }
    .print-section { margin-bottom: 0.6cm; }
    .print-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 0.3cm; margin-bottom: 0.5cm; }
    .print-footer { border-top: 2px solid #000; padding-top: 0.3cm; margin-top: 0.5cm; }
    .print-field { display: flex; gap: 0.3cm; margin-bottom: 0.2cm; }
    .print-label { font-weight: bold; min-width: 4cm; }
    .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3cm; }
    .print-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.2cm; }
    .section-title { font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #000; margin-bottom: 0.2cm; font-size: 10pt; }
    .sign-line { border-bottom: 1px solid #000; height: 1cm; margin-top: 0.8cm; }
    * { -webkit-print-color-adjust: exact !important; }
  }
  .print-only { display: none; }
  .sidebar-scroll { height: calc(100vh - 120px); overflow-y: auto; }
  .main-scroll { height: calc(100vh - 60px); overflow-y: auto; }
  input, textarea, select { transition: border-color 0.15s; }
  .patient-card:hover { background-color: rgba(59,130,246,0.08); }
  .patient-card.active { background-color: rgba(59,130,246,0.15); border-left: 3px solid #3b82f6; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .dark ::-webkit-scrollbar-thumb { background: #475569; }
</style>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100" id="appBody">

<!-- ===================== APP SHELL ===================== -->
<div class="flex h-screen overflow-hidden no-print">

  <!-- SIDEBAR -->
  <div class="w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col flex-shrink-0">
    <!-- Logo -->
    <div class="p-4 border-b border-gray-200 dark:border-gray-700">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-sm font-bold text-blue-700 dark:text-blue-400 leading-tight">Centro Médico</h1>
          <h1 class="text-sm font-bold text-blue-700 dark:text-blue-400 leading-tight">Real del Valle</h1>
          <p class="text-xs text-gray-500 dark:text-gray-400">Canatlán, Durango</p>
        </div>

          <svg id="iconSun" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
          <svg id="iconMoon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
      </div>
    </div>
    <!-- Search & New -->
    <div class="p-3 border-b border-gray-200 dark:border-gray-700 space-y-2">
      <input type="text" id="searchInput" placeholder="Buscar paciente..." oninput="filterPatients()"
        class="w-full px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button onclick="showNewPatient()"
        class="w-full py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
        + Nuevo Paciente

    <!-- Patient list -->
    <div class="sidebar-scroll p-2" id="patientList"></div>
    <!-- Export -->
    <div class="p-3 border-t border-gray-200 dark:border-gray-700">
      <button onclick="exportExcel()"
        class="w-full py-2 text-xs font-medium bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors">
        Exportar Excel
      </button>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top bar -->
    <div class="h-14 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center px-6 flex-shrink-0">
      <div id="topBarContent" class="flex items-center gap-4">
        <span class="text-gray-400 dark:text-gray-500 text-sm">Selecciona un paciente o crea uno nuevo</span>
      </div>
    </div>
    <!-- Content -->
    <div class="main-scroll p-6" id="mainContent">
      <!-- Welcome -->
      <div class="flex flex-col items-center justify-center h-full text-center text-gray-400 dark:text-gray-600">
        <svg class="w-20 h-20 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        <h2 class="text-xl font-semibold">Centro Médico Real del Valle</h2>
        <p class="text-sm mt-2">Dr. Noé Alejandro Zúñiga González · Cédula 12741802</p>
        <p class="text-xs mt-1">Canatlán, Durango</p>
      </div>
    </div>
  </div>
</div>

<!-- ===================== PRINT VIEW ===================== -->
<div id="printView" class="print-only print-page"></div>

<!-- ===================== JAVASCRIPT ===================== -->
<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
const DB_KEY = 'cmrv_data';
let state = { patients: [], folioCounter: 1, darkMode: false };

function loadState() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch(e) {}
}
function saveState() {
  localStorage.setItem(DB_KEY, JSON.stringify(state));
}

// ─── DARK MODE ──────────────────────────────────────────────────────────────
function toggleDark() {
  state.darkMode = !state.darkMode;
  applyDark();
  saveState();
}
function applyDark() {
  document.documentElement.classList.toggle('dark', state.darkMode);
  document.getElementById('iconSun').classList.toggle('hidden', !state.darkMode);
  document.getElementById('iconMoon').classList.toggle('hidden', state.darkMode);
}

// ─── PATIENT LIST ───────────────────────────────────────────────────────────
let activePatientId = null;
let activePanel = null; // 'profile' | 'visit' | 'history'

function filterPatients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderPatientList(q);
}

function renderPatientList(filter = '') {
  const el = document.getElementById('patientList');
  const patients = state.patients.filter(p =>
    p.nombre.toLowerCase().includes(filter)
  ).sort((a,b) => a.nombre.localeCompare(b.nombre));

  if (patients.length === 0) {
    el.innerHTML = `<p class="text-xs text-gray-400 dark:text-gray-600 text-center py-8">Sin pacientes</p>`;
    return;
  }

  el.innerHTML = patients.map(p => {
    const age = calcAge(p.fechaNac);
    const dx = p.diagnosticosCronicos?.slice(0,2).join(', ') || '—';
    const visits = p.visitas?.length || 0;
    const isActive = p.id === activePatientId;
    return `
    <div class="patient-card p-3 rounded-lg cursor-pointer mb-1 ${isActive ? 'active' : ''}" onclick="selectPatient('${p.id}')">
      <div class="flex items-start justify-between">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold truncate">${p.nombre}</p>
          <p class="text-xs text-gray-500 dark:text-gray-400">${age} años · ${p.sexo}</p>
          <p class="text-xs text-gray-400 dark:text-gray-500 truncate mt-0.5">${dx}</p>
        </div>
        <span class="text-xs bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 rounded-full px-2 py-0.5 ml-2 flex-shrink-0">${visits} notas</span>
      </div>
    </div>`;
  }).join('');
}

function calcAge(fechaNac) {
  if (!fechaNac) return '?';
  const today = new Date();
  const dob = new Date(fechaNac);
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  return age;
}

function selectPatient(id) {
  activePatientId = id;
  renderPatientList(document.getElementById('searchInput').value.toLowerCase());
  showPatientDashboard(id);
}

// ─── PATIENT DASHBOARD ──────────────────────────────────────────────────────
function showPatientDashboard(id) {
  const p = state.patients.find(x => x.id === id);
  if (!p) return;
  const age = calcAge(p.fechaNac);

  setTopBar(`
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <div class="w-9 h-9 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-blue-700 dark:text-blue-300 font-bold text-sm flex-shrink-0">
        ${p.nombre.charAt(0).toUpperCase()}
      </div>
      <div class="min-w-0">
        <p class="font-semibold text-sm truncate">${p.nombre}</p>
        <p class="text-xs text-gray-500 dark:text-gray-400">${age} años · ${p.sexo}</p>
      </div>
    </div>
    <div class="flex gap-2 flex-shrink-0">
      <button onclick="showPatientProfile('${id}')" class="btn-tab px-3 py-1.5 text-xs font-medium rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-blue-100 dark:hover:bg-blue-900 transition-colors">Historia Clínica</button>
      <button onclick="showNewVisit('${id}')" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition-colors">+ Nueva Nota</button>
    </div>
  `);

  // Show visit history
  const visits = (p.visitas || []).slice().reverse();
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="max-w-4xl mx-auto space-y-4">
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4">
        <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Resumen del Paciente</h3>
        <div class="grid grid-cols-2 gap-4 text-xs">
          <div><span class="text-gray-500 dark:text-gray-400">Diagnósticos crónicos:</span><br>${(p.diagnosticosCronicos||[]).join(', ')||'—'}</div>
          <div><span class="text-gray-500 dark:text-gray-400">Alergias:</span><br>${p.alergias||'—'}</div>
          <div><span class="text-gray-500 dark:text-gray-400">Medicamentos actuales:</span><br>
            ${(p.medicamentosActuales||[]).map(m=>`${m.nombre} ${m.dosis} ${m.frecuencia}`).join(', ')||'—'}
          </div>
          <div><span class="text-gray-500 dark:text-gray-400">Domicilio ref.:</span><br>${p.domicilio||'—'}</div>
        </div>
      </div>

      <div>
        <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Notas de Visita (${visits.length})</h3>
        ${visits.length === 0 ? `<div class="text-xs text-gray-400 text-center py-8">Sin notas registradas</div>` :
          visits.map(v => `
          <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 mb-3">
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xs font-bold text-blue-600 dark:text-blue-400">Folio #${v.folio}</span>
                  <span class="text-xs text-gray-500 dark:text-gray-400">${v.fecha} ${v.hora}</span>
                </div>
                <p class="text-sm font-medium">${v.motivoConsulta||'—'}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${(v.diagnosticosVisita||[]).join(', ')||'Sin diagnóstico'}</p>
              </div>
              <div class="flex gap-2 ml-4">
                <button onclick="showEditVisit('${id}','${v.id}')" class="text-xs px-2 py-1 rounded bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Editar</button>
                <button onclick="printVisit('${id}','${v.id}')" class="text-xs px-2 py-1 rounded bg-blue-100 dark:bg-blue-900 hover:bg-blue-200 dark:hover:bg-blue-800 text-blue-700 dark:text-blue-300 transition-colors">Imprimir</button>
                <button onclick="deleteVisit('${id}','${v.id}')" class="text-xs px-2 py-1 rounded bg-red-100 dark:bg-red-900 hover:bg-red-200 text-red-600 dark:text-red-400 transition-colors">Eliminar</button>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ─── NEW PATIENT FORM ───────────────────────────────────────────────────────
function showNewPatient(editId = null) {
  const p = editId ? state.patients.find(x => x.id === editId) : null;
  const title = editId ? 'Editar Historia Clínica' : 'Nuevo Paciente';
  activePatientId = editId;
  if (editId) renderPatientList(document.getElementById('searchInput').value.toLowerCase());

  setTopBar(`<span class="text-sm font-semibold">${title}</span>`);

  const v = p || {};
  const meds = (v.medicamentosActuales || []).length > 0 ? v.medicamentosActuales : [{}];

  document.getElementById('mainContent').innerHTML = `
  <div class="max-w-3xl mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 space-y-6">
      <h2 class="text-lg font-bold text-gray-800 dark:text-gray-200">${title}</h2>

      <!-- DATOS GENERALES -->
      <section>
        <h3 class="section-heading">Datos Generales</h3>
        <div class="grid grid-cols-2 gap-4">
          ${field('Nombre completo *','nombre','text',v.nombre,'col-span-2')}
          ${field('Fecha de nacimiento *','fechaNac','date',v.fechaNac)}
          ${selectField('Sexo *','sexo',['Masculino','Femenino','Otro'],v.sexo)}
          ${field('Domicilio / Referencia','domicilio','text',v.domicilio,'col-span-2')}
        </div>
      </section>

      <!-- ANTECEDENTES HEREDO-FAMILIARES -->
      <section>
        <h3 class="section-heading">Antecedentes Heredo-Familiares</h3>
        ${textarea('ahf','Diabetes, HTA, cardiopatías, neoplasias, etc.',v.ahf)}
      </section>

      <!-- ANTECEDENTES PERSONALES NO PATOLÓGICOS -->
      <section>
        <h3 class="section-heading">Antecedentes Personales No Patológicos</h3>
        <div class="grid grid-cols-2 gap-4">
          ${selectField('Tabaquismo','tabaquismo',['No','Ex-fumador','Fumador activo'],v.tabaquismo)}
          ${field('Cantidad / Años (tabaco)','tabaquismoDet','text',v.tabaquismoDet)}
          ${selectField('Alcoholismo','alcoholismo',['No','Ocasional','Habitual','Dependencia'],v.alcoholismo)}
          ${field('Detalle alcoholismo','alcoholismoDet','text',v.alcoholismoDet)}
          ${selectField('Toxicomanías','toxicomanias',['No','Sí'],v.toxicomanias)}
          ${field('Especificar toxicomanías','toxicomaniasDet','text',v.toxicomaniasDet)}
          ${field('Alimentación','alimentacion','text',v.alimentacion,'col-span-2')}
          ${field('Actividad física','actividadFisica','text',v.actividadFisica,'col-span-2')}
        </div>
      </section>

      <!-- ANTECEDENTES PERSONALES PATOLÓGICOS -->
      <section>
        <h3 class="section-heading">Antecedentes Personales Patológicos</h3>
        ${textarea('app','Enfermedades previas, hospitalizaciones, etc.',v.app)}
      </section>

      <!-- ANTECEDENTES QUIRÚRGICOS -->
      <section>
        <h3 class="section-heading">Antecedentes Quirúrgicos</h3>
        ${textarea('antQuirurgicos','Cirugías previas, fecha aproximada, complicaciones',v.antQuirurgicos)}
      </section>

      <!-- ALERGIAS -->
      <section>
        <h3 class="section-heading">Alergias y Reacciones Medicamentosas</h3>
        ${textarea('alergias','Medicamentos, alimentos, otros alérgenos',v.alergias)}
      </section>

      <!-- DIAGNÓSTICOS CRÓNICOS -->
      <section>
        <h3 class="section-heading">Diagnósticos Crónicos</h3>
        <div id="dxCronicosList" class="space-y-2 mb-2">
          ${(v.diagnosticosCronicos||[''])
            .map((d,i) => `<div class="flex gap-2 items-center">
              <input type="text" id="dxCronico_${i}" value="${esc(d)}" placeholder="Diagnóstico crónico"
                class="flex-1 input-base">
              <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-lg leading-none">×</button>
            </div>`).join('')}
        </div>
        <button type="button" onclick="addDxCronico()" class="text-xs text-blue-600 dark:text-blue-400 hover:underline">+ Agregar diagnóstico</button>
      </section>

      <!-- MEDICAMENTOS ACTUALES -->
      <section>
        <h3 class="section-heading">Medicamentos Actuales</h3>
        <div id="medsActualesList" class="space-y-2 mb-2">
          ${meds.map((m,i) => medRowActual(m,i)).join('')}
        </div>
        <button type="button" onclick="addMedActual()" class="text-xs text-blue-600 dark:text-blue-400 hover:underline">+ Agregar medicamento</button>
      </section>

      <!-- NOTAS ADICIONALES -->
      <section>
        <h3 class="section-heading">Notas Adicionales</h3>
        ${textarea('notasAdicionales','Información relevante adicional',v.notasAdicionales)}
      </section>

      <!-- ACTIONS -->
      <div class="flex gap-3 pt-2">
        <button onclick="savePatient('${editId||''}')"
          class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
          ${editId ? 'Guardar Cambios' : 'Registrar Paciente'}
        </button>
        ${editId ? `<button onclick="printProfile('${editId}')" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-lg transition-colors">Imprimir Historia</button>` : ''}
        <button onclick="cancelForm()" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-lg transition-colors">Cancelar</button>
      </div>
    </div>
  </div>`;
  applyInputStyles();
}

function showPatientProfile(id) {
  showNewPatient(id);
}

let medActualCount = 0;
function medRowActual(m, i) {
  medActualCount = Math.max(medActualCount, i+1);
  return `<div class="flex gap-2 items-center" id="medActual_${i}">
    <input type="text" id="medActualNombre_${i}" value="${esc(m.nombre||'')}" placeholder="Medicamento"
      class="flex-1 input-base">
    <input type="text" id="medActualDosis_${i}" value="${esc(m.dosis||'')}" placeholder="Dosis"
      class="w-28 input-base">
    <input type="text" id="medActualFreq_${i}" value="${esc(m.frecuencia||'')}" placeholder="Frecuencia"
      class="w-28 input-base">
    <button onclick="document.getElementById('medActual_${i}').remove()" class="text-red-400 hover:text-red-600 text-lg leading-none flex-shrink-0">×</button>
  </div>`;
}

function addMedActual() {
  const container = document.getElementById('medsActualesList');
  const i = medActualCount++;
  const div = document.createElement('div');
  div.innerHTML = medRowActual({}, i);
  container.appendChild(div.firstElementChild);
  applyInputStyles();
}

function addDxCronico() {
  const container = document.getElementById('dxCronicosList');
  const i = container.children.length;
  const div = document.createElement('div');
  div.className = 'flex gap-2 items-center';
  div.innerHTML = `
    <input type="text" id="dxCronico_${i}" placeholder="Diagnóstico crónico" class="flex-1 input-base">
    <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-lg leading-none">×</button>`;
  container.appendChild(div);
  applyInputStyles();
}

function savePatient(editId) {
  const nombre = document.getElementById('nombre')?.value?.trim();
  const fechaNac = document.getElementById('fechaNac')?.value;
  const sexo = document.getElementById('sexo')?.value;
  if (!nombre || !fechaNac || !sexo) {
    alert('Por favor completa los campos obligatorios: Nombre, Fecha de nacimiento y Sexo.');
    return;
  }

  // Collect diagnósticos crónicos
  const dxCronicos = [];
  document.querySelectorAll('[id^="dxCronico_"]').forEach(el => {
    if (el.value.trim()) dxCronicos.push(el.value.trim());
  });

  // Collect medicamentos actuales
  const medsActuales = [];
  document.querySelectorAll('[id^="medActualNombre_"]').forEach(el => {
    const i = el.id.split('_')[1];
    const nombre2 = el.value.trim();
    if (nombre2) {
      medsActuales.push({
        nombre: nombre2,
        dosis: document.getElementById(`medActualDosis_${i}`)?.value?.trim()||'',
        frecuencia: document.getElementById(`medActualFreq_${i}`)?.value?.trim()||''
      });
    }
  });

  const data = {
    nombre, fechaNac, sexo,
    domicilio: gv('domicilio'),
    ahf: gv('ahf'),
    tabaquismo: gv('tabaquismo'),
    tabaquismoDet: gv('tabaquismoDet'),
    alcoholismo: gv('alcoholismo'),
    alcoholismoDet: gv('alcoholismoDet'),
    toxicomanias: gv('toxicomanias'),
    toxicomaniasDet: gv('toxicomaniasDet'),
    alimentacion: gv('alimentacion'),
    actividadFisica: gv('actividadFisica'),
    app: gv('app'),
    antQuirurgicos: gv('antQuirurgicos'),
    alergias: gv('alergias'),
    diagnosticosCronicos: dxCronicos,
    medicamentosActuales: medsActuales,
    notasAdicionales: gv('notasAdicionales'),
  };

  if (editId) {
    const idx = state.patients.findIndex(x => x.id === editId);
    if (idx >= 0) {
      state.patients[idx] = { ...state.patients[idx], ...data };
    }
  } else {
    data.id = uid();
    data.visitas = [];
    data.creadoEn = new Date().toISOString();
    state.patients.push(data);
    activePatientId = data.id;
  }
  saveState();
  renderPatientList();
  if (activePatientId) showPatientDashboard(activePatientId);
}

}

let medVisitaCount = 0;
function medRowVisita(m, i) {
  medVisitaCount = Math.max(medVisitaCount, i+1);
  return `<div class="flex gap-2 items-center" id="medVisita_${i}">
    <input type="text" id="medVisitaNombre_${i}" value="${esc(m.nombre||'')}" placeholder="Medicamento"
      class="flex-1 input-base">
    <input type="text" id="medVisitaDosis_${i}" value="${esc(m.dosis||'')}" placeholder="Dosis"
      class="w-24 input-base">
    <input type="text" id="medVisitaFreq_${i}" value="${esc(m.frecuencia||'')}" placeholder="Frecuencia"
      class="w-28 input-base">
    <input type="text" id="medVisitaDur_${i}" value="${esc(m.duracion||'')}" placeholder="Duración"
      class="w-24 input-base">
    <button onclick="document.getElementById('medVisita_${i}').remove()" class="text-red-400 hover:text-red-600 text-lg leading-none flex-shrink-0">×</button>
  </div>`;
}

function addMedVisita() {
  const container = document.getElementById('medsVisitaList');
  const i = medVisitaCount++;
  const div = document.createElement('div');
  div.innerHTML = medRowVisita({}, i);
  container.appendChild(div.firstElementChild);
  applyInputStyles();
}

function addDxVisita() {
  const container = document.getElementById('dxVisitaList');
  const i = container.children.length;
  const div = document.createElement('div');
  div.className = 'flex gap-2 items-center';
  div.innerHTML = `
    <input type="text" id="dxVisita_${i}" placeholder="Diagnóstico" class="flex-1 input-base">
    <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-lg leading-none">×</button>`;
  container.appendChild(div);
  applyInputStyles();
}

function toggleHorasComida() {
  const tipo = document.getElementById('tipoGlucosa')?.value;
  document.getElementById('horasComidaDiv')?.classList.toggle('hidden', tipo !== 'Postprandial');
}

function calcIMC() {
  const peso = parseFloat(document.getElementById('peso')?.value);
  const talla = parseFloat(document.getElementById('talla')?.value);
  const imcEl = document.getElementById('imc');
  if (imcEl && peso > 0 && talla > 0) {
    imcEl.value = (peso / (talla * talla)).toFixed(1);
  }
}

function saveVisit(patientId, editVisitId) {
  const p = state.patients.find(x => x.id === patientId);
  if (!p) return;

  const dxVisita = [];
  document.querySelectorAll('[id^="dxVisita_"]').forEach(el => {
    if (el.value.trim()) dxVisita.push(el.value.trim());
  });

  const medsIndicados = [];
  document.querySelectorAll('[id^="medVisitaNombre_"]').forEach(el => {
    const i = el.id.split('_')[1];
    const nombre = el.value.trim();
    if (nombre) {
      medsIndicados.push({
        nombre,
        dosis: document.getElementById(`medVisitaDosis_${i}`)?.value?.trim()||'',
        frecuencia: document.getElementById(`medVisitaFreq_${i}`)?.value?.trim()||'',
        duracion: document.getElementById(`medVisitaDur_${i}`)?.value?.trim()||'',
      });
    }
  });

  const peso = gv('peso');
  const talla = gv('talla');
  const imc = peso && talla ? (parseFloat(peso)/(parseFloat(talla)**2)).toFixed(1) : '';

  const visitData = {
    fecha: gv('visitaFecha') || formatDate(new Date()),
    hora: gv('visitaHora') || formatTime(new Date()),
    motivoConsulta: gv('motivoConsulta'),
    sintomasReferidos: gv('sintomasReferidos'),
    peso, talla, imc,
    taSistolica: gv('taSistolica'),
    taDiastolica: gv('taDiastolica'),
    fc: gv('fc'),
    temperatura: gv('temperatura'),
    fr: gv('fr'),
    sato2: gv('sato2'),
    glucosa: gv('glucosa'),
    tipoGlucosa: gv('tipoGlucosa'),
    horasComida: gv('horasComida'),
    estadoGeneral: gv('estadoGeneral'),
    diagnosticosVisita: dxVisita,
    planManejo: gv('planManejo'),
    medicamentosIndicados: medsIndicados,
    proximaCita: gv('proximaCita'),
    seguimiento: gv('seguimiento'),
    obsAdicionales: gv('obsAdicionales'),
  };

  if (!p.visitas) p.visitas = [];

  if (editVisitId) {
    const idx = p.visitas.findIndex(x => x.id === editVisitId);
    if (idx >= 0) {
      p.visitas[idx] = { ...p.visitas[idx], ...visitData };
    }
  } else {
    visitData.id = uid();
    visitData.folio = state.folioCounter++;
    visitData.creadoEn = new Date().toISOString();
    p.visitas.push(visitData);
  }

  saveState();
  renderPatientList();
  showPatientDashboard(patientId);
  return editVisitId ? p.visitas.find(x=>x.id===editVisitId) : p.visitas[p.visitas.length-1];
}

function saveAndPrintVisit(patientId, editVisitId) {
  const v = saveVisit(patientId, editVisitId);
  if (v) {
    const p = state.patients.find(x => x.id === patientId);
    doPrintVisit(p, v);
  }
}

function deleteVisit(patientId, visitId) {
  if (!confirm('¿Eliminar esta nota de visita?')) return;
  const p = state.patients.find(x => x.id === patientId);
  if (p) {
    p.visitas = (p.visitas||[]).filter(v => v.id !== visitId);
    saveState();
    showPatientDashboard(patientId);
  }
}

  const p = state.patients.find(x => x.id === patientId);

  if (p && v) doPrintVisit(p, v);
}

function renderPrint(html) {
  const pv = document.getElementById('printView');
  pv.innerHTML = html;
  pv.style.display = 'block';
  setTimeout(() => {
    window.print();
    setTimeout(() => { pv.style.display = 'none'; }, 1000);
  }, 200);
}

// ─── EXPORT EXCEL ───────────────────────────────────────────────────────────
function exportExcel() {
  if (!state.patients.length) { alert('No hay pacientes registrados.'); return; }

  const wb = XLSX.utils.book_new();

  // Patients sheet
  const pRows = [['ID','Nombre','Fecha Nac','Edad','Sexo','Domicilio','Dx Crónicos','Alergias','Medicamentos Actuales','AHF','APP','Creado']];
  state.patients.forEach(p => {
    pRows.push([
      p.id, p.nombre, p.fechaNac, calcAge(p.fechaNac), p.sexo, p.domicilio||'',
      (p.diagnosticosCronicos||[]).join('; '),
      p.alergias||'',
      (p.medicamentosActuales||[]).map(m=>`${m.nombre} ${m.dosis} ${m.frecuencia}`).join('; '),
      p.ahf||'', p.app||'',
      p.creadoEn ? new Date(p.creadoEn).toLocaleDateString('es-MX') : '',
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pRows), 'Pacientes');

  // Visits sheet
  const vRows = [['Folio','Paciente','Fecha','Hora','Motivo','Diagnósticos','T/A','FC','Temp','FR','SatO2','Glucosa','Tipo Glu','Peso','Talla','IMC','Plan','Próx.Cita']];
  state.patients.forEach(p => {
    (p.visitas||[]).forEach(v => {
      vRows.push([
        v.folio, p.nombre, v.fecha, v.hora, v.motivoConsulta||'',
        (v.diagnosticosVisita||[]).join('; '),
        `${v.taSistolica||''}/${v.taDiastolica||''}`,
        v.fc||'', v.temperatura||'', v.fr||'', v.sato2||'',
        v.glucosa||'', v.tipoGlucosa||'',
        v.peso||'', v.talla||'', v.imc||'',
        v.planManejo||'', v.proximaCita||'',
      ]);
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(vRows), 'Notas de Visita');

  XLSX.writeFile(wb, `CMRV_${formatDate(new Date()).replace(/\//g,'-')}.xlsx`);
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function gv(id) { return document.getElementById(id)?.value?.trim() || ''; }
function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d) { return d.toISOString().split('T')[0]; }
function formatTime(d) { return d.toTimeString().slice(0,5); }

function setTopBar(html) {
  document.getElementById('topBarContent').innerHTML = html;
}

function cancelForm() {
  if (activePatientId) showPatientDashboard(activePatientId);
  else {
    setTopBar('<span class="text-gray-400 dark:text-gray-500 text-sm">Selecciona un paciente o crea uno nuevo</span>');
    document.getElementById('mainContent').innerHTML = `
      <div class="flex flex-col items-center justify-center h-full text-center text-gray-400 dark:text-gray-600">
        <h2 class="text-xl font-semibold">Centro Médico Real del Valle</h2>
        <p class="text-sm mt-2">Dr. Noé Alejandro Zúñiga González · Cédula 12741802</p>
      </div>`;
  }
}

function field(label, id, type, value='', extraClass='') {
  return `<div class="${extraClass}">
    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">${label}</label>
    <input type="${type}" id="${id}" value="${esc(String(value||''))}"
      class="w-full input-base" ${type==='number'?'step="any"':''}>
  </div>`;
}

function selectField(label, id, options, value='') {
  const opts = options.map(o => `<option value="${o}" ${o===value?'selected':''}>${o}</option>`).join('');
  return `<div>
    <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">${label}</label>
    <select id="${id}" class="w-full input-base">
      <option value="">—</option>
      ${opts}
    </select>
  </div>`;
}

function textarea(id, placeholder, value='') {
  return `<textarea id="${id}" rows="3" placeholder="${placeholder}"
    class="w-full input-base resize-y">${esc(String(value||''))}</textarea>`;
}

function applyInputStyles() {
  document.querySelectorAll('.input-base').forEach(el => {
    el.className = el.className.replace('input-base','');
    el.classList.add(
      'w-full','px-3','py-2','text-sm','rounded-lg','border',
      'border-gray-300','dark:border-gray-600',
      'bg-white','dark:bg-gray-700',
      'text-gray-900','dark:text-gray-100',
      'placeholder-gray-400','dark:placeholder-gray-500',
      'focus:outline-none','focus:ring-2','focus:ring-blue-500',
      'focus:border-transparent','transition-colors'
    );
  });
  // Section headings
  document.querySelectorAll('.section-heading').forEach(el => {
    el.className = '';
    el.classList.add(
      'text-xs','font-bold','uppercase','tracking-wide',
      'text-gray-500','dark:text-gray-400',
      'border-b','border-gray-200','dark:border-gray-600',
      'pb-1','mb-3'
    );
  });
}
